                    <input class="kanban-form-input" type="date" id="add-due-${status}" />
                    <div style="display:flex;gap:8px;justify-content:flex-end;">
                        <button class="kanban-form-btn secondary" onclick="cancelAddTask('${status}')">Cancel</button>
                        <button class="kanban-form-btn primary" onclick="saveNewTask('${status}')">Save</button>
                    </div>
                </div>
            `;
        }

        function renderTasksBoard() {
            const tasks = filteredTasks();
            const columns = Object.entries(TASK_STATUS_META).map(([status, meta]) => ({
                title: meta.title,
                status,
                tasks: tasks.filter(task => task.status === status),
                color: meta.color,
            }));

            return `
                <div class="kanban-board">
                    ${columns.map(col => `
                        <div class="kanban-column" data-status="${col.status}"
                             ondragover="onTaskDragOver(event)" ondragleave="onTaskDragLeave(event)" ondrop="onTaskDrop(event, '${col.status}')">
                            <div class="kanban-col-header">
                                <span class="kanban-col-title">${col.title}</span>
                                <span class="kanban-col-count">${col.tasks.length}</span>
                            </div>
                            <div id="kanban-cards-${col.status}">
                                ${col.tasks.map(t => renderTaskCard(t)).join('')}
                            </div>
                            <div id="add-task-area-${col.status}"></div>
                            <button class="kanban-add-btn" onclick="showAddTaskForm('${col.status}')">+ Add Task</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderOverviewBar() {
            const total = tasksData.length;
            const counts = getTaskCounts();
            const todoCount = counts.todo;
            const doingCount = counts.in_progress;
            const doneCount = counts.done;
            const donePercent = total > 0 ? Math.round((doneCount / total) * 100) : 0;
            const todoPercent = total > 0 ? Math.round((todoCount / total) * 100) : 0;
            const doingPercent = total > 0 ? Math.round((doingCount / total) * 100) : 0;

            return `
                <div class="tasks-overview-bar">
                    <div style="flex-shrink:0;">
                        <canvas id="tasksDonutChart" width="80" height="80"></canvas>
                    </div>
                    <div class="tasks-stat-card" style="flex:1;box-shadow:0 8px 32px rgba(0,0,0,0.35),0 0 30px rgba(59,130,246,0.12);">
                        <div style="font-size:11px;font-weight:500;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">To Do</div>
                        <div style="display:flex;align-items:baseline;gap:8px;">
                            <span style="font-size:24px;font-weight:600;color:rgba(255,255,255,0.9);">${todoCount}</span>
                            <span style="font-size:12px;color:#3B82F6;font-weight:600;">${todoPercent}%</span>
                        </div>
                    </div>
                    <div class="tasks-stat-card" style="flex:1;box-shadow:0 8px 32px rgba(0,0,0,0.35),0 0 30px rgba(245,158,11,0.12);">
                        <div style="font-size:11px;font-weight:500;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">Doing</div>
                        <div style="display:flex;align-items:baseline;gap:8px;">
                            <span style="font-size:24px;font-weight:600;color:rgba(255,255,255,0.9);">${doingCount}</span>
                            <span style="font-size:12px;color:#F59E0B;font-weight:600;">${doingPercent}%</span>
                        </div>
                    </div>
                    <div class="tasks-stat-card" style="flex:1;box-shadow:0 8px 32px rgba(0,0,0,0.35),0 0 30px rgba(16,185,129,0.12);">
                        <div style="font-size:11px;font-weight:500;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">Done</div>
                        <div style="display:flex;align-items:baseline;gap:8px;">
                            <span style="font-size:24px;font-weight:600;color:rgba(255,255,255,0.9);">${doneCount}</span>
                            <span style="font-size:12px;color:#10B981;font-weight:600;">${donePercent}%</span>
                        </div>
                    </div>
                    <div class="tasks-motivation-pill">${getMotivation(donePercent)}</div>
                </div>
            `;
        }

        function renderFilterBar() {
            return `
                <div class="tasks-filter-bar">
                    <select class="tasks-filter-select" id="tasks-cat-filter" onchange="tasksCategoryFilter=this.value;renderTasksContent();">
                        <option value="All" ${tasksCategoryFilter === 'All' ? 'selected' : ''}>All Categories</option>
                        <option value="Design" ${tasksCategoryFilter === 'Design' ? 'selected' : ''}>Design</option>
                        <option value="Architecture" ${tasksCategoryFilter === 'Architecture' ? 'selected' : ''}>Architecture</option>
                        <option value="Development" ${tasksCategoryFilter === 'Development' ? 'selected' : ''}>Development</option>
                        <option value="Review" ${tasksCategoryFilter === 'Review' ? 'selected' : ''}>Review</option>
                    </select>
                    <select class="tasks-filter-select" id="tasks-pri-filter" onchange="tasksPriorityFilter=this.value;renderTasksContent();">
                        <option value="All" ${tasksPriorityFilter === 'All' ? 'selected' : ''}>All Priorities</option>
                        <option value="Urgent" ${tasksPriorityFilter === 'Urgent' ? 'selected' : ''}>Urgent</option>
                        <option value="High" ${tasksPriorityFilter === 'High' ? 'selected' : ''}>High</option>
                        <option value="Normal" ${tasksPriorityFilter === 'Normal' ? 'selected' : ''}>Normal</option>
                        <option value="Low" ${tasksPriorityFilter === 'Low' ? 'selected' : ''}>Low</option>
                    </select>
                    <button class="refresh-btn" onclick="loadTasksTab()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        Refresh
                    </button>
                </div>
            `;
        }

        function renderTasksContent() {
            const container = document.getElementById('tasks-container');
            if (!container) return;
            if (activeTaskDetailId && !tasksData.some(t => t.id === activeTaskDetailId)) {
                activeTaskDetailId = null;
            }
            container.innerHTML = renderOverviewBar() + renderFilterBar() + renderTasksBoard();
            initTasksDonut();
        }

        function initTasksDonut() {
            const canvas = document.getElementById('tasksDonutChart');
            if (!canvas) return;
            if (tasksChart) { tasksChart.destroy(); tasksChart = null; }

            const counts = getTaskCounts();
            const todoCount = counts.todo;
            const doingCount = counts.in_progress;
            const doneCount = counts.done;

            tasksChart = new Chart(canvas, {
                type: 'doughnut',
                data: {
                    labels: ['To Do', 'Doing', 'Done'],
                    datasets: [{
                        data: [todoCount, doingCount, doneCount],
                        backgroundColor: ['#3B82F6', '#F59E0B', '#10B981'],
                        borderWidth: 0,
                        hoverOffset: 4,
                    }]
                },
                options: {
                    responsive: false,
                    cutout: '65%',
                    plugins: { legend: { display: false }, tooltip: { enabled: true } },
                }
            });
        }

        async function loadTasksTab() {
            const container = document.getElementById('tasks-container');
            if (!container) return;

            container.innerHTML = tasksSkeletonHTML();

            try {
                const sb = getSupabase();
                if (!sb) throw new Error('Supabase SDK not loaded');

                let { data, error } = await sb.from('agent_tasks').select('*').order('created_at', { ascending: true });
                if (error) throw error;

                if (!data || data.length === 0) {
                    const { data: seeded, error: seedErr } = await sb.from('agent_tasks').insert(SEED_TASKS).select();
                    if (seedErr) {
                        const msg = seedErr.message || '';
                        if (msg.toLowerCase().includes('row-level security')) {
                            tasksData = [];
                            container.innerHTML = tasksErrorHTML('Tasks table is empty and Supabase RLS blocked automatic seeding.') + renderTasksEmptyState('The tab itself works now, but your current policies do not allow inserting seed tasks from the browser. Create an insert policy for authenticated users on `agent_tasks`, or seed the rows once from the Supabase dashboard/SQL editor.');
                            return;
                        }
                        throw seedErr;
                    }
                    data = seeded || [];
                }

                tasksData = data;
                renderTasksContent();
            } catch (err) {
                console.error('Tasks fetch failed:', err);
                container.innerHTML = tasksErrorHTML(err.message || 'Unable to load tasks') + tasksSkeletonHTML();
            }
        }

        // ── Drag and Drop ───────────────────────────────
        let draggedTaskId = null;

        function onTaskDragStart(e, taskId) {
            _taskCardDragged = true;
            draggedTaskId = taskId;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', taskId);
        }

        function onTaskDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over'));
            draggedTaskId = null;
        }

        function onTaskDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const col = e.target.closest('.kanban-column');
            if (col) col.classList.add('drag-over');
        }

        function onTaskDragLeave(e) {
            const col = e.target.closest('.kanban-column');
            if (col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over');
        }

        async function onTaskDrop(e, newStatus) {
            e.preventDefault();
            const col = e.target.closest('.kanban-column');
            if (col) col.classList.remove('drag-over');

            const taskId = draggedTaskId || e.dataTransfer.getData('text/plain');
            if (!taskId) return;

            const task = tasksData.find(t => t.id === taskId);
            if (!task || task.status === newStatus) return;

            const previous = { status: task.status, completed: task.completed };

            // Optimistic update
            task.status = newStatus;
            task.completed = newStatus === 'done';
            renderTasksContent();

            // Persist
            try {
                const sb = getSupabase();
                const { error } = await sb.from('agent_tasks').update({
                    status: newStatus,
                    completed: newStatus === 'done'
                }).eq('id', taskId);
                if (error) throw error;
            } catch (err) {
                Object.assign(task, previous);
                renderTasksContent();
                console.error('Failed to update task status:', err);
                alert('Could not move task in Supabase. The board was reverted.');
            }
        }

        // ── Task checkbox ───────────────────────────────
        async function toggleTaskDone(e, taskId) {
            e.stopPropagation();
            const task = tasksData.find(t => t.id === taskId);
            if (!task) return;

            const previous = { status: task.status, completed: task.completed };
            if (task.status === 'done') {
                task.status = 'todo';
                task.completed = false;
            } else {
                task.status = 'done';
                task.completed = true;
            }
            renderTasksContent();

            try {
                const sb = getSupabase();
                const { error } = await sb.from('agent_tasks').update({
                    status: task.status,
                    completed: task.completed
                }).eq('id', taskId);
                if (error) throw error;
            } catch (err) {
                Object.assign(task, previous);
                renderTasksContent();
                console.error('Failed to toggle task:', err);
                alert('Could not update task completion in Supabase. The board was reverted.');
            }
        }

        // ── Three-dot menu ──────────────────────────────
        function toggleTaskMenu(e, taskId) {
            e.stopPropagation();
            const menu = document.getElementById(`task-menu-${taskId}`);
            const shouldOpen = menu && menu.style.display === 'none';
            closeTaskMenus();
            if (menu && shouldOpen) menu.style.display = 'block';
        }

        // Close menus on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.kanban-menu-btn')) {
                closeTaskMenus();
            }
        });

        // Esc to close detail modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && activeTaskDetailId) {
                closeTaskDetail();
            }
        });

        // ── Add Task ────────────────────────────────────
        function showAddTaskForm(status) {
            const area = document.getElementById(`add-task-area-${status}`);
            if (!area) return;
            area.innerHTML = addTaskFormHTML(status);
        }

        function cancelAddTask(status) {
            const area = document.getElementById(`add-task-area-${status}`);
            if (area) area.innerHTML = '';
        }

        async function saveNewTask(status) {
            const title = document.getElementById(`add-title-${status}`)?.value?.trim();
            const agent = document.getElementById(`add-agent-${status}`)?.value;
            const category = document.getElementById(`add-category-${status}`)?.value;
            const priority = document.getElementById(`add-priority-${status}`)?.value;
            const track = document.getElementById(`add-track-${status}`)?.value;
            const due = document.getElementById(`add-due-${status}`)?.value || null;

            if (!title || !agent || !category || !priority || !track) return;

            const newTask = {
                title,
                agent_name: agent,
                role: AGENT_ROLES[agent] || 'User',
                category,
                priority,
                track_status: track,
                status,
                completed: status === 'done',
                due_date: due,
            };

            try {
                const sb = getSupabase();
                const { data, error } = await sb.from('agent_tasks').insert([newTask]).select();
                if (error) throw error;
                if (data && data[0]) tasksData.push(data[0]);
                renderTasksContent();
            } catch (err) {
                console.error('Failed to add task:', err);
            }
        }

        // ── Edit Modal ──────────────────────────────────
        function openEditModal(taskId) {
            closeTaskMenus();

            const task = tasksData.find(t => t.id === taskId);
            if (!task) return;

            const overlay = document.createElement('div');
            overlay.className = 'task-modal-overlay';
            overlay.id = 'task-edit-overlay';
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

            const agentOptions = ['Mira', 'Ari', 'Noah', 'Lena', 'Manual'].map(a => `<option value="${a}" ${task.agent_name === a ? 'selected' : ''}>${a}</option>`).join('');
            const catOptions = ['Design', 'Architecture', 'Development', 'Review'].map(c => `<option value="${c}" ${task.category === c ? 'selected' : ''}>${c}</option>`).join('');
            const priOptions = ['Urgent', 'High', 'Normal', 'Low'].map(p => `<option value="${p}" ${task.priority === p ? 'selected' : ''}>${p}</option>`).join('');
            const trackOptions = ['On Track', 'At Risk', 'Off Track'].map(t2 => `<option value="${t2}" ${task.track_status === t2 ? 'selected' : ''}>${t2}</option>`).join('');

            overlay.innerHTML = `
                <div class="task-modal">
                    <h3>Edit Task</h3>
                    <div style="display:flex;flex-direction:column;gap:12px;">
                        <input class="kanban-form-input" id="edit-title" value="${task.title}" placeholder="Title" />
                        <select class="kanban-form-select" id="edit-agent">${agentOptions}</select>
                        <select class="kanban-form-select" id="edit-category">${catOptions}</select>
                        <select class="kanban-form-select" id="edit-priority">${priOptions}</select>
                        <select class="kanban-form-select" id="edit-track">${trackOptions}</select>
                        <input class="kanban-form-input" type="date" id="edit-due" value="${task.due_date || ''}" />
                        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
                            <button class="kanban-form-btn secondary" onclick="document.getElementById('task-edit-overlay').remove()">Cancel</button>
                            <button class="kanban-form-btn primary" onclick="saveEditTask('${taskId}')">Save</button>
                        </div>
                    </div>
                </div>
            `;

            document.body.appendChild(overlay);
        }

        async function saveEditTask(taskId) {
            const title = document.getElementById('edit-title')?.value?.trim();
            const agent = document.getElementById('edit-agent')?.value;
            const category = document.getElementById('edit-category')?.value;
            const priority = document.getElementById('edit-priority')?.value;
            const track = document.getElementById('edit-track')?.value;
            const due = document.getElementById('edit-due')?.value || null;

            if (!title) return;

            const updates = {
                title,
                agent_name: agent,
                role: AGENT_ROLES[agent] || 'User',
                category,
                priority,
                track_status: track,
                due_date: due,
            };

            const task = tasksData.find(t => t.id === taskId);
            const previous = task ? { ...task } : null;

            // Optimistic update
            if (task) Object.assign(task, updates);
            document.getElementById('task-edit-overlay')?.remove();
            renderTasksContent();

            try {
                const sb = getSupabase();
                const { error } = await sb.from('agent_tasks').update(updates).eq('id', taskId);
                if (error) throw error;
            } catch (err) {
                if (task && previous) Object.assign(task, previous);
                renderTasksContent();
                console.error('Failed to edit task:', err);
                alert('Could not save task edits to Supabase. The board was reverted.');
            }
        }

        // ── Delete Task ─────────────────────────────────
        async function deleteTask(taskId) {
            closeTaskMenus();
            if (!confirm('Delete this task?')) return;

            const previousTasks = [...tasksData];
            tasksData = tasksData.filter(t => t.id !== taskId);
            renderTasksContent();

            try {
                const sb = getSupabase();
                const { error } = await sb.from('agent_tasks').delete().eq('id', taskId);
                if (error) throw error;
            } catch (err) {
                tasksData = previousTasks;
                renderTasksContent();
                console.error('Failed to delete task:', err);
                alert('Could not delete task from Supabase. The board was reverted.');
            }
        }

        // Check auth on load
        checkAuth();
    </script>
</body>
</html>
