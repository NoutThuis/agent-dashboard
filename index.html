<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent OS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <style>
        /* ── Reset & Base ─────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0A0F1E 0%, #0F172A 100%);
            min-height: 100vh;
            min-width: 1280px;
            overflow-x: auto;
            color: rgba(255, 255, 255, 0.9);
            position: relative;
        }

        /* ── Ambient Light Blobs ──────────────────────── */
        .ambient-layer {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            will-change: transform;
        }

        .blob-1 {
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.19) 0%, transparent 70%);
            top: -15%;
            left: -10%;
            animation: drift-1 68s ease-in-out infinite;
        }

        .blob-2 {
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.17) 0%, transparent 70%);
            top: 40%;
            right: -8%;
            animation: drift-2 74s ease-in-out infinite;
        }

        .blob-3 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, transparent 70%);
            bottom: -10%;
            left: 30%;
            animation: drift-3 80s ease-in-out infinite;
        }

        @keyframes drift-1 {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(60px, 40px); }
            50% { transform: translate(20px, 80px); }
            75% { transform: translate(-40px, 30px); }
        }

        @keyframes drift-2 {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-50px, -30px); }
            50% { transform: translate(-80px, 20px); }
            75% { transform: translate(-20px, -50px); }
        }

        @keyframes drift-3 {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(40px, -40px); }
            50% { transform: translate(-30px, -60px); }
            75% { transform: translate(50px, -20px); }
        }

        /* ── Glass Card System ────────────────────────── */
        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px) saturate(1.8);
            -webkit-backdrop-filter: blur(40px) saturate(1.8);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(255, 255, 255, 0.06),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
            transition: background 300ms ease, border-color 300ms ease;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.25) 30%, rgba(255, 255, 255, 0.25) 70%, transparent 100%);
            pointer-events: none;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.18);
        }

        /* ── Navigation Bar (higher opacity glass) ───── */
        .glass-nav {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px) saturate(1.8);
            -webkit-backdrop-filter: blur(40px) saturate(1.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.06);
            position: relative;
            isolation: isolate;
        }

        .glass-nav::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.12) 20%, rgba(255, 255, 255, 0.12) 80%, transparent 100%);
            pointer-events: none;
        }

        /* ── Tab Navigation (Sidebar) ─────────────────── */
        .tab-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 6px;
        }

        .tab-btn {
            position: relative;
            z-index: 10;
            padding: 11px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            background: transparent;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: color 300ms ease, background 300ms ease, box-shadow 300ms ease;
            white-space: nowrap;
            user-select: none;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn svg {
            flex-shrink: 0;
            opacity: 0.7;
            transition: opacity 300ms ease;
        }

        .tab-btn:hover svg {
            opacity: 0.9;
        }

        .tab-btn.active svg {
            opacity: 1;
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.75);
            background: rgba(255, 255, 255, 0.04);
        }

        .tab-btn.active {
            color: #60A5FA;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* ── Tab Content ─────────────────────────────── */
        .tab-panel {
            opacity: 0;
            display: none;
            animation: none;
        }

        .tab-panel.active {
            display: block;
            animation: tab-fade-in 200ms ease forwards;
        }

        @keyframes tab-fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ── Staggered Card Entrance ─────────────────── */
        @keyframes card-enter {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-animate {
            opacity: 0;
            animation: card-enter 400ms ease forwards;
        }

        .card-animate:nth-child(1) { animation-delay: 0ms; }
        .card-animate:nth-child(2) { animation-delay: 100ms; }
        .card-animate:nth-child(3) { animation-delay: 200ms; }
        .card-animate:nth-child(4) { animation-delay: 300ms; }
        .card-animate:nth-child(5) { animation-delay: 400ms; }
        .card-animate:nth-child(6) { animation-delay: 500ms; }

        /* ── Utility ─────────────────────────────────── */
        .text-primary { color: rgba(255, 255, 255, 0.9); }
        .text-secondary { color: rgba(255, 255, 255, 0.5); }

        .accent-glow-purple {
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.15);
        }

        .accent-glow-cyan {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.15);
        }

        .accent-glow-amber {
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.15);
        }

        .gradient-text {
            background: linear-gradient(135deg, #7C3AED, #EC4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ── Agents Tab Styles ────────────────────────── */
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .skeleton-pulse {
            background: linear-gradient(
                110deg,
                rgba(255, 255, 255, 0.03) 0%,
                rgba(255, 255, 255, 0.06) 40%,
                rgba(255, 255, 255, 0.03) 60%,
                rgba(255, 255, 255, 0.06) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: 12px;
        }

        .agent-card-stagger > :nth-child(1) { opacity: 0; animation: card-enter 400ms ease forwards; animation-delay: 0ms; }
        .agent-card-stagger > :nth-child(2) { opacity: 0; animation: card-enter 400ms ease forwards; animation-delay: 100ms; }
        .agent-card-stagger > :nth-child(3) { opacity: 0; animation: card-enter 400ms ease forwards; animation-delay: 200ms; }
        .agent-card-stagger > :nth-child(4) { opacity: 0; animation: card-enter 400ms ease forwards; animation-delay: 300ms; }

        .activity-feed-scroll {
            max-height: 480px;
            overflow-y: auto;
            position: relative;
        }

        .activity-feed-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .activity-feed-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }

        .activity-row {
            transition: background 200ms ease;
        }

        .activity-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 6px 14px;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 200ms ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .refresh-btn svg {
            transition: transform 400ms ease;
        }

        .refresh-btn.spinning svg {
            transform: rotate(360deg);
        }

        .error-banner {
            background: rgba(239, 68, 68, 0.08);
            backdrop-filter: blur(40px) saturate(1.8);
            -webkit-backdrop-filter: blur(40px) saturate(1.8);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 14px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        /* ── Login Screen ─────────────────────────────── */
        .login-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0A0F1E 0%, #0F172A 100%);
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(40px) saturate(1.8);
            -webkit-backdrop-filter: blur(40px) saturate(1.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
            padding: 40px;
            width: 400px;
            position: relative;
            overflow: hidden;
            animation: card-enter 400ms ease forwards;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.15) 30%, rgba(255, 255, 255, 0.15) 70%, transparent 100%);
            pointer-events: none;
        }

        .login-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 200ms ease, background 200ms ease;
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .login-input:focus {
            border-color: rgba(124, 58, 237, 0.5);
            background: rgba(255, 255, 255, 0.06);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.8), rgba(236, 72, 153, 0.8));
            border: none;
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.95);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 200ms ease, box-shadow 200ms ease;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
        }

        .login-btn:hover {
            opacity: 0.9;
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: #F87171;
            display: none;
        }

        .login-error.visible {
            display: block;
        }

        .app-container {
            display: none;
            flex-direction: row;
        }

        .app-container.visible {
            display: flex;
        }

        /* ── Mission Control Widget ───────────────────── */
        .mission-control-wrapper {
            position: relative;
            margin: 0 0 20px 0;
            padding: 0 4px;
            z-index: 200;
        }

        .mission-control-trigger {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 200ms ease;
        }

        .mission-control-trigger:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .mc-status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .mc-status-idle {
            background: #34D399;
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
            animation: mc-pulse 2.5s ease-in-out infinite;
        }

        .mc-status-active {
            background: #F59E0B;
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
            animation: mc-pulse-amber 2.5s ease-in-out infinite;
        }

        @keyframes mc-pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(52, 211, 153, 0.5); }
            50% { opacity: 0.6; box-shadow: 0 0 14px rgba(52, 211, 153, 0.7); }
        }

        @keyframes mc-pulse-amber {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(245, 158, 11, 0.5); }
            50% { opacity: 0.6; box-shadow: 0 0 14px rgba(245, 158, 11, 0.7); }
        }

        .mission-control-panel {
            position: absolute;
            top: 0;
            left: 100%;
            width: 320px;
            margin-left: 12px;
            background: #1C1F2E;
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 16px;
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.06);
            padding: 16px;
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
            transition: opacity 250ms ease, transform 250ms ease;
            z-index: 300;
        }

        .mission-control-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.20) 30%, rgba(255, 255, 255, 0.20) 70%, transparent 100%);
            pointer-events: none;
        }

        .mission-control-wrapper:hover .mission-control-panel {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .mc-section {
            padding: 8px 0;
        }

        .mc-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 0;
        }

        /* ── Tasks Tab Styles ─────────────────────────── */
        .tasks-overview-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            max-height: 120px;
        }

        .tasks-stat-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px) saturate(1.8);
            -webkit-backdrop-filter: blur(40px) saturate(1.8);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.06), inset 0 1px 0 0 rgba(255, 255, 255, 0.06);
            padding: 16px 20px;
            min-width: 140px;
            position: relative;
            overflow: hidden;
        }

        .tasks-stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.25) 30%, rgba(255, 255, 255, 0.25) 70%, transparent 100%);
            pointer-events: none;
        }

        .tasks-motivation-pill {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.5), rgba(236, 72, 153, 0.5));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.25), 0 0 40px rgba(236, 72, 153, 0.15);
            animation: motivation-glow 3s ease-in-out infinite alternate;
        }

        @keyframes motivation-glow {
            from { box-shadow: 0 0 20px rgba(124, 58, 237, 0.25), 0 0 40px rgba(236, 72, 153, 0.15); }
            to { box-shadow: 0 0 30px rgba(124, 58, 237, 0.35), 0 0 50px rgba(236, 72, 153, 0.25); }
        }

        .tasks-filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .tasks-filter-select {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px) saturate(1.8);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 12px;
            padding: 8px 14px;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='rgba(255,255,255,0.4)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 32px;
            transition: border-color 200ms ease, background 200ms ease;
        }

        .tasks-filter-select:hover {
            background-color: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .tasks-filter-select:focus {
            border-color: rgba(124, 58, 237, 0.5);
        }

        .tasks-filter-select option {
            background: #1a1f2e;
            color: rgba(255, 255, 255, 0.9);
        }

        .tasks-board-shell {
            position: relative;
            min-height: 400px;
        }

        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            min-height: 400px;
            transition: filter 300ms ease;
        }

        .tasks-board-shell.detail-open .kanban-board {
            filter: brightness(0.82);
        }

        .kanban-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 300px;
            padding: 4px;
            border-radius: 20px;
            transition: background 200ms ease, box-shadow 200ms ease;
        }

        .kanban-column.drag-over {
            background: rgba(124, 58, 237, 0.06);
            box-shadow: inset 0 0 30px rgba(124, 58, 237, 0.08);
        }

        .kanban-col-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 4px 12px;
        }

        .kanban-col-title {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
        }

        .kanban-col-count {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
        }

        .kanban-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px) saturate(1.8);
            -webkit-backdrop-filter: blur(40px) saturate(1.8);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.06), inset 0 1px 0 0 rgba(255, 255, 255, 0.06);
            padding: 20px;
            cursor: grab;
            transition: transform 200ms ease, box-shadow 200ms ease, opacity 200ms ease, background 200ms ease, border-color 200ms ease;
            position: relative;
            overflow: hidden;
        }

        .kanban-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.25) 30%, rgba(255, 255, 255, 0.25) 70%, transparent 100%);
            pointer-events: none;
        }

        .kanban-card:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.18);

                closeIntelDeployModal();
                showIntelToast('No deployment plan found for this use case');
                return;

            try {
                const sb = getSupabase();
                const { data, error } = await sb.from('agent_tasks').insert(deployTasks).select();

                if (Array.isArray(data) && data.length) {
                    tasksData = [...tasksData, ...data];

                closeIntelDeployModal();
                showIntelToast(`Use case deployed — ${deployTasks.length} tasks created in Tasks tab`);
            } catch (err) {
                console.error('Failed to deploy intelligence use case:', err);

        async function loadIntelligenceTab() {
            const container = document.getElementById('intelligence-container');
            if (!container) return;
            intelligenceLoading = true;
            container.innerHTML = renderIntelligenceSkeleton();

            try {
                const sb = getSupabase();
                if (!sb) throw new Error('Supabase SDK not loaded');

                const { data, error } = await sb
                    .from('agent_intelligence_items')
                    .select('*')
                    .order('momentum_score', { ascending: false })
                    .order('discovered_at', { ascending: false });

                if (error) throw error;

                if (data && data.length > 0) {
                    intelligenceData = data.map(normalizeIntelligenceRow);
                } else {
                    intelligenceData = [...SEED_INTELLIGENCE_USE_CASES];
                }
            } catch (err) {
                console.warn('Intelligence tab falling back to seed data:', err);
                intelligenceData = [...SEED_INTELLIGENCE_USE_CASES];
            }

            intelligenceLoading = false;
            intelligenceRefreshing = false;
            if (!intelligenceData.some(i => i.id === intelligenceSelectedId) && intelligenceData[0]) {
                intelligenceSelectedId = intelligenceData[0].id;
            }
            renderIntelligenceTab();
        }

        // ── Mission Control — Jarvis System Status ──────
        (function initMissionControl() {
            let gatewayStartMs = null;
            let heartbeatIntervalMs = 30 * 60 * 1000;
            let lastHeartbeatTs = null;

            // Clock (every second)
            function updateMCTime() {
                const el = document.getElementById('mcTime');
                if (el) el.textContent = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }
            setInterval(updateMCTime, 1000);
            updateMCTime();

            // Heartbeat interval progress bar (every second)
            function updateIntervalBar() {
                const bar = document.getElementById('mcIntervalBar');
                const label = document.getElementById('mcIntervalLabel');
                if (!bar || !lastHeartbeatTs) return;
                const elapsed = Date.now() - lastHeartbeatTs;
                const pct = Math.min(100, Math.max(0, (elapsed / heartbeatIntervalMs) * 100));
                bar.style.width = pct.toFixed(1) + '%';
                const remainSec = Math.max(0, Math.floor((heartbeatIntervalMs - elapsed) / 1000));
                const m = Math.floor(remainSec / 60);
                const s = remainSec % 60;
                if (label) label.textContent = remainSec <= 0 ? 'Check due' : `${m}m ${s}s remaining`;
            }
            setInterval(updateIntervalBar, 1000);

            // Heartbeat countdown (every second)
            function updateCountdown() {
                const el = document.getElementById('mcCountdown');
                if (!el) return;
                if (!lastHeartbeatTs) { el.textContent = '—'; return; }
                const nextCheck = lastHeartbeatTs + heartbeatIntervalMs;
                const remaining = Math.max(0, Math.floor((nextCheck - Date.now()) / 1000));
                if (remaining <= 0) { el.textContent = 'Now'; return; }
                const m = Math.floor(remaining / 60);
                const s = remaining % 60;
                el.textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
            }
            setInterval(updateCountdown, 1000);

            // Estimate last heartbeat from 30m-interval grid
            function estimateLastHeartbeat(intervalMin) {
                const d = new Date();
                d.setMinutes(d.getMinutes() - (d.getMinutes() % intervalMin), 0, 0);
                lastHeartbeatTs = d.getTime();
            }

            // Fetch system-status.json for real gateway start time
            async function fetchSystemStatus() {
                try {
                    const res = await fetch('system-status.json?t=' + Date.now());
                    if (!res.ok) throw new Error('fetch failed');
                    const data = await res.json();
                    if (data.gateway_started) {
                        gatewayStartMs = new Date(data.gateway_started).getTime();
                    }
                    if (data.heartbeat_interval_min) {
                        heartbeatIntervalMs = data.heartbeat_interval_min * 60 * 1000;
                    }
                    estimateLastHeartbeat(data.heartbeat_interval_min || 30);
                    updateUptime();
                } catch (e) {
                    console.warn('Mission Control: could not load system-status.json', e);
                    // Fallback: estimate gateway started ~2 days ago
                    gatewayStartMs = Date.now() - 2 * 86400 * 1000;
                    estimateLastHeartbeat(30);
                }
            }

            fetchSystemStatus();
            // Re-fetch every 5 minutes in case it updates
            setInterval(fetchSystemStatus, 5 * 60 * 1000);

            // Activity status: check agent_logs for recent entries
            async function updateActivityStatus() {
                try {

                    const { data, error } = await sb
                        .from('agent_logs')

                        .gte('created_at', fiveMinAgo)

        function weekStart() {
            const d = new Date();
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday
            const mon = new Date(d);
            mon.setDate(diff);
            mon.setHours(0, 0, 0, 0);
            return mon.toISOString();
        }

        function relativeTime(dateStr) {
            if (!dateStr) return 'Never';
            const now = Date.now();
            const then = new Date(dateStr).getTime();
            const diff = now - then;
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return `${mins} min ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

                        <span style="font-size:11px;font-weight:500;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.05);padding:3px 8px;border-radius:6px;flex-shrink:0;">${truncate(log.model_used || '', 20)}</span>
                        <span style="font-size:11px;font-weight:500;color:${sc.text};background:${sc.bg};padding:3px 10px;border-radius:6px;flex-shrink:0;">${log.status || 'unknown'}</span>
                    </div>
                `;
            }).join('');

            // Model Usage Tracker
            const todayLogs = logs.filter(l => new Date(l.created_at) >= new Date(todayStr));
            const modelRows = AGENTS.map(agent => {
                const agentToday = todayLogs.filter(l => (l.agent_name || '').toLowerCase() === agent.name.toLowerCase());
                // Most used model today
                const modelCounts = {};
                agentToday.forEach(l => { if (l.model_used) modelCounts[l.model_used] = (modelCounts[l.model_used] || 0) + 1; });
                const topModel = Object.entries(modelCounts).sort((a, b) => b[1] - a[1])[0];
                return `
                    <tr>
                        <td style="padding:10px 14px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.8);">
                            <span style="display:inline-flex;align-items:center;gap:8px;">
                                <span style="width:8px;height:8px;border-radius:50%;background:${agent.glow};display:inline-block;"></span>
                                ${agent.name}
                            </span>
                        </td>
                        <td style="padding:10px 14px;font-size:12px;color:rgba(255,255,255,0.5);">${topModel ? truncate(topModel[0], 24) : 'N/A'}</td>
                        <td style="padding:10px 14px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.8);text-align:right;">${agentToday.length}</td>
                    </tr>
                `;
            }).join('');

            return `
                <div style="display:flex;gap:24px;" class="agent-card-stagger">
                    <!-- Activity Feed -->
                    <div class="glass-card" style="flex:0.65;padding:0;overflow:hidden;">
                        <div style="padding:18px 24px 12px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;">
                            <span style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.8);">Recent Activity</span>
                            <span style="font-size:11px;color:rgba(255,255,255,0.3);">${recent.length} entries</span>
                        </div>
                        <div class="activity-feed-scroll" style="padding:8px 12px;">
                            ${feedRows.length > 0 ? feedRows : '<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px;">No activity yet</div>'}
                        </div>
                        <div style="position:sticky;bottom:0;height:32px;background:linear-gradient(transparent, rgba(10,15,30,0.6));pointer-events:none;"></div>
                    </div>

                    <!-- Model Usage -->
                    <div class="glass-card" style="flex:0.35;padding:0;overflow:hidden;">
                        <div style="padding:18px 24px 12px;border-bottom:1px solid rgba(255,255,255,0.06);">
                            <span style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.8);">Model Usage</span>
                        </div>
                        <div style="padding:4px 0;">
                            <table style="width:100%;border-collapse:collapse;">
                                <thead>
                                    <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
                                        <th style="padding:10px 14px;font-size:11px;font-weight:500;color:rgba(255,255,255,0.3);text-align:left;text-transform:uppercase;letter-spacing:0.05em;">Agent</th>
                                        <th style="padding:10px 14px;font-size:11px;font-weight:500;color:rgba(255,255,255,0.3);text-align:left;text-transform:uppercase;letter-spacing:0.05em;">Model</th>
                                        <th style="padding:10px 14px;font-size:11px;font-weight:500;color:rgba(255,255,255,0.3);text-align:right;text-transform:uppercase;letter-spacing:0.05em;">Tasks</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${modelRows}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        // ── Dashboard Tab ────────────────────────────────
        function dashboardSkeleton() {
            return `
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-bottom:32px;">
                    ${[1,2,3,4].map(() => `<div class="skeleton-pulse" style="height:90px;border-radius:16px;"></div>`).join('')}
                </div>
                <div style="display:grid;grid-template-columns:3fr 2fr;gap:24px;margin-bottom:32px;">
                    <div class="skeleton-pulse" style="height:420px;border-radius:20px;"></div>
                    <div style="display:flex;flex-direction:column;gap:24px;">
                        <div class="skeleton-pulse" style="height:180px;border-radius:20px;"></div>
                        <div class="skeleton-pulse" style="height:200px;border-radius:20px;"></div>
                    </div>
                </div>
                <div class="skeleton-pulse" style="height:240px;border-radius:20px;"></div>
            `;
        }

        function dashStatusDot(status) {
            const s = (status || '').toLowerCase();
            if (s === 'completed') return { color: '#10B981', pulse: false, label: 'Completed' };
            if (s === 'in_progress' || s === 'running') return { color: '#F59E0B', pulse: true, label: 'In Progress' };
            if (s === 'failed') return { color: '#EF4444', pulse: false, label: 'Failed' };
            return { color: '#6B7280', pulse: false, label: status || 'Unknown' };
        }

        async function loadDashboardTab(silent = false) {
            const container = document.getElementById('dashboard-container');
            if (!container) return;
            if (!silent) container.innerHTML = dashboardSkeleton();

            let logs = [];
            let tasks = [];
            let docs = [];
            let logsError = false;
            let tasksError = false;
            let docsError = false;

            try {
                const sb = getSupabase();
                if (!sb) throw new Error('Supabase not loaded');

                const [logsRes, tasksRes, docsRes] = await Promise.allSettled([
                    sb.from('agent_logs').select('*').order('created_at', { ascending: false }).limit(500),
                    sb.from('agent_tasks').select('*'),
                    sb.from('agent_documents').select('*').order('created_at', { ascending: false }).limit(10)
                ]);

                if (logsRes.status === 'fulfilled' && !logsRes.value.error) {
                    logs = logsRes.value.data || [];
                } else {
                    logsError = true;
                }

                if (tasksRes.status === 'fulfilled' && !tasksRes.value.error) {
                    tasks = tasksRes.value.data || [];
                } else {
                    tasksError = true;
                }

                if (docsRes.status === 'fulfilled' && !docsRes.value.error) {
                    docs = docsRes.value.data || [];
                } else {
                    docsError = true;
                }
            } catch (e) {
                logsError = true;
                tasksError = true;
                docsError = true;
            }

            // Compute stats
            const now = new Date();
            const todayISO = todayStart();
            const yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000).toISOString();

            const inProgressCount = tasksError ? '—' : tasks.filter(t => (t.status || '').toLowerCase() === 'in_progress').length;

            const recentAgents = logsError ? '—' : (() => {
                const names = new Set();
                logs.forEach(l => { if (new Date(l.created_at) >= new Date(yesterday)) names.add(l.agent_name); });
                return names.size;
            })();

            const completedToday = logsError ? '—' : logs.filter(l => (l.status || '').toLowerCase() === 'completed' && new Date(l.created_at) >= new Date(todayISO)).length;

            const currentTime = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

            // ROW 1 — Status Overview Cards
            const row1 = `
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-bottom:32px;" class="agent-card-stagger">
                    <!-- TODO: Connect to real system status -->
                    <div class="glass-card" id="dashSystemStatus" style="padding:24px;border-top:2px solid rgba(16,185,129,0.35);box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.08),inset 0 1px 0 0 rgba(255,255,255,0.08),0 0 35px rgba(16,185,129,0.22);">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                            <div style="width:8px;height:8px;border-radius:50%;background:#6B7280;box-shadow:0 0 8px rgba(107,114,128,0.5);" id="dashSysDot"></div>
                            <span style="font-size:15px;font-weight:600;color:rgba(255,255,255,0.9);" id="dashSysLabel">Checking…</span>
                        </div>
                        <div style="font-size:12px;color:rgba(255,255,255,0.35);" id="dashSysSub">Last checked: ${currentTime}</div>
                    </div>
                    <div class="glass-card" style="padding:24px;border-top:2px solid rgba(245,158,11,0.35);box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.08),inset 0 1px 0 0 rgba(255,255,255,0.08),0 0 35px rgba(245,158,11,0.22);">
                        <div style="font-size:28px;font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:4px;">${inProgressCount}</div>
                        <div style="font-size:12px;color:rgba(255,255,255,0.4);">tasks in progress</div>
                        ${tasksError ? '<div style="font-size:11px;color:#F87171;margin-top:6px;">Unable to load — <span onclick="loadDashboardTab()" style="cursor:pointer;text-decoration:underline;">Retry</span></div>' : ''}
                    </div>
                    <div class="glass-card" style="padding:24px;border-top:2px solid rgba(124,58,237,0.35);box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.08),inset 0 1px 0 0 rgba(255,255,255,0.08),0 0 35px rgba(124,58,237,0.22);">
                        <div style="font-size:28px;font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:4px;">${recentAgents} <span style="font-size:16px;font-weight:400;color:rgba(255,255,255,0.35);">/ 4</span></div>
                        <div style="font-size:12px;color:rgba(255,255,255,0.4);">agents active today</div>
                        ${logsError ? '<div style="font-size:11px;color:#F87171;margin-top:6px;">Unable to load — <span onclick="loadDashboardTab()" style="cursor:pointer;text-decoration:underline;">Retry</span></div>' : ''}
                    </div>
                    <div class="glass-card" style="padding:24px;border-top:2px solid rgba(6,182,212,0.35);box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.08),inset 0 1px 0 0 rgba(255,255,255,0.08),0 0 35px rgba(6,182,212,0.22);">
                        <div style="font-size:28px;font-weight:700;color:rgba(255,255,255,0.9);margin-bottom:4px;">${completedToday}</div>
                        <div style="font-size:12px;color:rgba(255,255,255,0.4);">completed today</div>
                        ${logsError ? '<div style="font-size:11px;color:#F87171;margin-top:6px;">Unable to load — <span onclick="loadDashboardTab()" style="cursor:pointer;text-decoration:underline;">Retry</span></div>' : ''}
                    </div>
                </div>
            `;

            // ROW 2 LEFT — Live Activity Feed
            const recentLogs = logs.slice(0, 20);
            const activityRows = logsError
                ? `<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.35);font-size:13px;">Unable to load activity — <span onclick="loadDashboardTab()" style="cursor:pointer;text-decoration:underline;color:#F87171;">Retry</span></div>`
                : recentLogs.length === 0
                    ? `<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px;">No activity recorded yet</div>`
                    : recentLogs.map(l => {
                        const st = dashStatusDot(l.status);
                        const ac = agentColor(l.agent_name);
                        return `
                            <div class="activity-row" style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:10px;">
                                <div style="width:8px;height:8px;border-radius:50%;background:${st.color};box-shadow:0 0 6px ${hexToRgba(st.color, 0.4)};flex-shrink:0;${st.pulse ? 'animation:mc-pulse-amber 2s ease-in-out infinite;' : ''}"></div>
                                <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:${hexToRgba(st.color, 0.12)};color:${st.color};flex-shrink:0;">${st.label}</span>
                                <span style="font-size:13px;font-weight:600;color:${ac};flex-shrink:0;">${l.agent_name || 'Unknown'}</span>
                                <span style="font-size:13px;color:rgba(255,255,255,0.6);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${truncate(l.task_description || '', 60)}</span>
                                <div style="text-align:right;flex-shrink:0;">
                                    <div style="font-size:11px;color:rgba(255,255,255,0.35);">${relativeTime(l.created_at)}</div>
                                    ${l.model_used ? `<div style="font-size:10px;color:rgba(255,255,255,0.2);margin-top:2px;">${l.model_used}</div>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');

            const row2Left = `
                <div class="glass-card" style="padding:0;overflow:hidden;">
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;">
                        <div style="display:flex;align-items:center;gap:8px;">
                            <div style="width:7px;height:7px;border-radius:50%;background:#10B981;box-shadow:0 0 8px rgba(16,185,129,0.5);animation:mc-pulse 2.5s ease-in-out infinite;"></div>
                            <span style="font-size:15px;font-weight:600;color:rgba(255,255,255,0.85);">Live Activity</span>
                        </div>
                        <span style="font-size:12px;color:rgba(255,255,255,0.3);cursor:pointer;transition:color 200ms;" onmouseover="this.style.color='rgba(255,255,255,0.6)'" onmouseout="this.style.color='rgba(255,255,255,0.3)'">View All</span>
                    </div>
                    <div class="activity-feed-scroll" style="max-height:400px;padding:0 8px 12px;">
                        ${activityRows}
                    </div>
                </div>
            `;

            // ROW 2 RIGHT — Stacked panels

            // Panel 1: Availability — based on agent_tasks in_progress
            const busyAgents = {};
            if (!tasksError) {
                tasks.forEach(t => {
                    if ((t.status || '').toLowerCase() === 'in_progress' && t.agent_name) {
                        busyAgents[t.agent_name.toLowerCase()] = (busyAgents[t.agent_name.toLowerCase()] || 0) + 1;
                    }
                });
            }
            const anyBusy = Object.keys(busyAgents).length > 0;
            const headerDotColor = anyBusy ? '#F59E0B' : '#10B981';
            const availabilityPanel = `
                <div class="glass-card" style="padding:20px 24px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                        <div style="width:7px;height:7px;border-radius:50%;background:${headerDotColor};box-shadow:0 0 6px ${hexToRgba(headerDotColor, 0.4)};"></div>
                        <span style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);">Availability</span>
                    </div>
                    ${tasksError
                        ? '<div style="font-size:12px;color:#F87171;">Unable to load — <span onclick="loadDashboardTab()" style="cursor:pointer;text-decoration:underline;">Retry</span></div>'
                        : AGENTS.map(a => {
                            const busy = busyAgents[a.name.toLowerCase()] || 0;
                            const isBusy = busy > 0;
                            const statusColor = isBusy ? '#F59E0B' : 'rgba(52,211,153,0.7)';
                            const statusText = isBusy ? `Working on ${busy} task${busy > 1 ? 's' : ''}` : 'Available';
                            return `
                                <div style="display:flex;align-items:center;gap:10px;padding:7px 0;">
                                    <div style="width:7px;height:7px;border-radius:50%;background:${a.glow};box-shadow:0 0 6px ${hexToRgba(a.glow, 0.4)};flex-shrink:0;"></div>
                                    <span style="font-size:13px;font-weight:600;color:${a.glow};min-width:40px;">${a.name}</span>
                                    <span style="font-size:12px;color:${statusColor};">${statusText}</span>
                                </div>
                            `;
                        }).join('')}
                </div>
            `;

            // Panel 2: Recent Documents — from agent_documents table
            const docsContent = docsError
                ? '<div style="font-size:12px;color:#F87171;">Unable to load — <span onclick="loadDashboardTab()" style="cursor:pointer;text-decoration:underline;">Retry</span></div>'
                : docs.length === 0
                    ? '<div style="font-size:12px;color:rgba(255,255,255,0.3);">No documents yet</div>'
                    : docs.map(d => {
                        const ftype = (d.file_type || d.name.split('.').pop() || '?').toUpperCase();
                        return `
                            <div style="display:flex;align-items:center;gap:10px;padding:7px 0;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                                <div style="flex:1;overflow:hidden;">
                                    <div style="font-size:13px;color:rgba(255,255,255,0.75);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.file_url ? '<a href="' + d.file_url + '" target="_blank" style="color:rgba(255,255,255,0.75);text-decoration:none;">' + d.name + '</a>' : d.name}</div>
                                    <div style="font-size:11px;color:rgba(255,255,255,0.3);"><span style="color:${agentColor(d.agent_name)}">${d.agent_name}</span> · ${relativeTime(d.created_at)}</div>
                                </div>
                                <span style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.35);">${ftype}</span>
                            </div>
                        `;
                    }).join('');
            const docsPanel = `
                <div class="glass-card" style="padding:20px 24px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                        <span style="font-size:14px;">📄</span>
                        <span style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);">Recent Documents</span>
                    </div>
                    ${docsContent}
                </div>
            `;

            // Panel 3: Workshop Queue
            // TODO: Connect to real task queue system
            const queue = [
                { title: 'Redesign settings page', agent: 'Mira', priority: '#EF4444', pLabel: 'Urgent' },
                { title: 'Build form validation', agent: 'Noah', priority: '#F59E0B', pLabel: 'High' },
                { title: 'Review auth flow', agent: 'Lena', priority: '#3B82F6', pLabel: 'Normal' },
            ];
            const queuePanel = `
                <div class="glass-card" style="padding:20px 24px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                        <span style="font-size:14px;">⚡</span>
                        <span style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);">Workshop Queue</span>
                    </div>
                    ${queue.map(q => `
                        <div style="display:flex;align-items:center;gap:10px;padding:7px 0;">
                            <div style="width:7px;height:7px;border-radius:50%;background:${q.priority};box-shadow:0 0 6px ${hexToRgba(q.priority, 0.4)};flex-shrink:0;"></div>
                            <span style="font-size:13px;color:rgba(255,255,255,0.7);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${q.title}</span>
                            <span style="font-size:12px;font-weight:500;color:${agentColor(q.agent)};">${q.agent}</span>
                        </div>
                    `).join('')}
                </div>
            `;

            const row2 = `
                <div style="display:grid;grid-template-columns:3fr 2fr;gap:24px;margin-bottom:32px;" class="agent-card-stagger">
                    ${row2Left}
                    <div style="display:flex;flex-direction:column;gap:24px;">
                        ${availabilityPanel}
                        ${docsPanel}
                        ${queuePanel}
                    </div>
                </div>
            `;

            // ROW 3 — Recent Commits (from agent_logs with status=completed)
            const completedLogs = logsError ? [] : logs.filter(l => (l.status || '').toLowerCase() === 'completed').slice(0, 8);
            const commitsContent = logsError
                ? '<div style="padding:20px;text-align:center;font-size:13px;color:rgba(255,255,255,0.35);">Unable to load — <span onclick="loadDashboardTab()" style="cursor:pointer;text-decoration:underline;color:#F87171;">Retry</span></div>'
                : completedLogs.length === 0
                    ? '<div style="padding:20px;text-align:center;font-size:13px;color:rgba(255,255,255,0.3);">No completed operations yet</div>'
                    : completedLogs.map(c => {
                        const name = c.agent_name || 'Unknown';
                        const color = agentColor(name);
                        const agent = AGENTS.find(a => a.name.toLowerCase() === name.toLowerCase());
                        const role = agent ? agent.role.split(' ').pop().toLowerCase() : 'task';
                        const desc = c.task_description || 'Completed task';
                        const msg = `${name.toLowerCase()}/${role}: ${desc}`;
                        return `
                            <div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-left:2px solid ${color};padding-left:14px;margin-left:4px;">
                                <div style="width:7px;height:7px;border-radius:50%;background:${color};box-shadow:0 0 6px ${hexToRgba(color, 0.4)};flex-shrink:0;"></div>
                                <span style="font-size:13px;font-weight:600;color:${color};flex-shrink:0;">${name}</span>
                                <span style="font-size:13px;color:rgba(255,255,255,0.6);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${truncate(msg, 70)}</span>
                                <span style="font-size:11px;color:rgba(255,255,255,0.3);flex-shrink:0;">${relativeTime(c.created_at)}</span>
                            </div>
                        `;
                    }).join('');

            const row3 = `
                <div class="glass-card" style="padding:24px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
                        <span style="font-size:14px;">🔄</span>
                        <span style="font-size:15px;font-weight:600;color:rgba(255,255,255,0.85);">Recent Commits</span>
                        <span style="font-size:12px;color:rgba(255,255,255,0.3);margin-left:4px;">Latest completed operations</span>
                    </div>
                    ${commitsContent}
                </div>
            `;

            container.innerHTML = row1 + row2 + row3;

            // System Status card — check real health
            (async function checkSystemStatus() {
                const dot = document.getElementById('dashSysDot');
                const label = document.getElementById('dashSysLabel');
                const sub = document.getElementById('dashSysSub');
                const card = document.getElementById('dashSystemStatus');
                if (!dot || !label) return;

                let issues = [];

                // Check 1: Gateway config reachable
                try {
                    const res = await fetch('system-status.json?t=' + Date.now());
                    if (!res.ok) issues.push('Gateway config unreachable');
                } catch (e) { issues.push('Gateway config unreachable'); }

                // Check 2: Supabase reachable (we already fetched)
                if (logsError) issues.push('Agent logs unavailable');
                if (tasksError) issues.push('Task data unavailable');

                const time = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

                if (issues.length === 0) {
                    dot.style.background = '#10B981';
                    dot.style.boxShadow = '0 0 8px rgba(16,185,129,0.5)';
                    label.textContent = 'All Systems Online';
                    if (card) {
                        card.style.borderTopColor = 'rgba(16,185,129,0.35)';
                        card.style.boxShadow = '0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.08),inset 0 1px 0 0 rgba(255,255,255,0.08),0 0 35px rgba(16,185,129,0.22)';
                    }
                } else if (issues.length <= 1) {
                    dot.style.background = '#F59E0B';
                    dot.style.boxShadow = '0 0 8px rgba(245,158,11,0.5)';
                    label.textContent = 'Partial Issues';
                    if (card) {
                        card.style.borderTopColor = 'rgba(245,158,11,0.35)';
                        card.style.boxShadow = '0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.08),inset 0 1px 0 0 rgba(255,255,255,0.08),0 0 35px rgba(245,158,11,0.22)';
                    }
                } else {
                    dot.style.background = '#EF4444';
                    dot.style.boxShadow = '0 0 8px rgba(239,68,68,0.5)';
                    label.textContent = 'Systems Degraded';
                    if (card) {
                        card.style.borderTopColor = 'rgba(239,68,68,0.35)';
                        card.style.boxShadow = '0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.08),inset 0 1px 0 0 rgba(255,255,255,0.08),0 0 35px rgba(239,68,68,0.22)';
                    }
                }

                if (sub) sub.textContent = issues.length > 0 ? issues.join(' · ') + ` · ${time}` : `Last checked: ${time}`;
            })();

            // Re-check system status every 30 seconds while on dashboard tab
            if (!window._dashHealthInterval) {
                window._dashHealthInterval = setInterval(() => {
                    const panel = document.getElementById('panel-dashboard');
                    if (panel && panel.classList.contains('active')) {
                        loadDashboardTab(true);
                    }

            }

        // ── Main Data Loader ────────────────────────────
        async function loadAgentsTab() {
            const container = document.getElementById('agents-container');
            container.innerHTML = renderSkeleton();

            try {
                const sb = getSupabase();
                if (!sb) throw new Error('Supabase SDK not loaded');
                const { data, error } = await sb
                    .from('agent_logs')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(500);

                if (error) throw error;

                const logs = data || [];

                // Inject refresh button into the page title bar actions area
                const actionsEl = document.getElementById('pageTitleActions');
                if (actionsEl) {
                    actionsEl.innerHTML = `
                        <button class="refresh-btn" id="agentsRefreshBtn" onclick="refreshAgents()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                            </svg>
                            Refresh
                        </button>
                    `;
                }

                container.innerHTML = `
                    ${renderStatsRow(logs)}
                    ${renderAgentCards(logs)}
                    ${renderBottomRow(logs)}
                `;
            } catch (err) {
                console.error('Supabase fetch failed:', err);
                container.innerHTML = renderError() + renderSkeleton();
            }
        }

            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatTaskDate(value, fallback = 'N/A') {
            if (!value) return fallback;
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return fallback;
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: 'numeric',
                minute: '2-digit'
            });
        }

        function formatTaskDateShort(value, fallback = 'No due date') {
            if (!value) return fallback;
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return fallback;
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }

        let _taskCardDownPos = null;
        let _taskCardDragged = false;

        function taskCardMouseDown(e) {
            _taskCardDownPos = { x: e.clientX, y: e.clientY };
            _taskCardDragged = false;
        }

        function taskCardMouseUp(e, taskId) {
            // Ignore clicks on checkbox, menu button, or dropdown items
            if (e.target.closest('.kanban-card-checkbox') || e.target.closest('.kanban-menu-btn') || e.target.closest('.kanban-dropdown')) return;

            // If a drag happened, don't open
            if (_taskCardDragged) return;

            // Check distance from mousedown to mouseup (threshold: 6px)
            if (_taskCardDownPos) {
                const dx = Math.abs(e.clientX - _taskCardDownPos.x);
                const dy = Math.abs(e.clientY - _taskCardDownPos.y);
                if (dx > 6 || dy > 6) return;
            }

            openTaskDetail(taskId);
        }

        function openTaskDetail(taskId) {
            activeTaskDetailId = taskId;
            // Remove old overlay if any
            document.getElementById('task-detail-overlay')?.remove();
            const html = renderTaskDetailPanel();
            if (!html) return;
            document.body.insertAdjacentHTML('beforeend', html);
            // Trigger open transition on next frame
            requestAnimationFrame(() => {
                document.getElementById('task-detail-overlay')?.classList.add('open');
            });
        }

        function closeTaskDetail() {
            if (!activeTaskDetailId) return;
            const overlay = document.getElementById('task-detail-overlay');
            if (overlay) {
                overlay.classList.remove('open');
                setTimeout(() => overlay.remove(), 320);
            }
            activeTaskDetailId = null;

            if (!metadata) {
                return '<div style="font-size:13px;color:rgba(255,255,255,0.42);">No metadata recorded</div>';
            }

            const data = typeof metadata === 'string' ? (() => {
                try { return JSON.parse(metadata); } catch { return metadata; }
            })() : metadata;

            if (typeof data !== 'object' || data === null || Array.isArray(data)) {
                return `<div class="task-detail-value" style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">${escapeHTML(typeof data === 'string' ? data : JSON.stringify(data, null, 2))}</div>`;
            }

            const entries = Object.entries(data);
            if (!entries.length) {
                return '<div style="font-size:13px;color:rgba(255,255,255,0.42);">No metadata recorded</div>';
            }

            return `
                <div style="display:flex;flex-direction:column;gap:10px;">
                    ${entries.map(([key, val]) => `
                        <div style="display:flex;flex-direction:column;gap:4px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06);">
                            <div class="task-detail-label" style="font-size:10px;">${escapeHTML(key)}</div>
